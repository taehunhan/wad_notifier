name: Naver Booking Monitor

on:
  workflow_dispatch:
  schedule:
    # 한국시간 매일 09:00~23:00 사이 10분마다 실행
    # GitHub cron은 UTC 기준이므로 KST - 9시간
    - cron: "*/10 0-14 * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium --with-deps

      - name: Check Naver booking availability
        env:
          TARGET_DATES: "2026-05-08,2026-05-09,2026-05-10"
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python monitor_naver_booking.py